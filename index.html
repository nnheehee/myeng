<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="영단어 퀴즈">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>매일 영단어 퀴즈</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      padding-top: env(safe-area-inset-top, 20px);
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
      width: 100%;
      max-width: 400px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header .date {
      font-size: 14px;
      color: #94a3b8;
    }

    .stats {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .stat-box {
      background: #1e293b;
      border-radius: 12px;
      padding: 12px 20px;
      text-align: center;
      min-width: 80px;
    }

    .stat-box .number {
      font-size: 24px;
      font-weight: 700;
      color: #38bdf8;
    }

    .stat-box .label {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .streak-box .number {
      color: #f97316;
    }

    .progress-bar {
      width: 100%;
      max-width: 400px;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .quiz-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .quiz-number {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 16px;
    }

    .word {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .phonetic {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 8px;
    }

    .part-of-speech {
      font-size: 13px;
      color: #818cf8;
      margin-bottom: 24px;
      font-weight: 500;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-btn {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }

    .option-btn:active {
      transform: scale(0.98);
    }

    .option-btn.correct {
      border-color: #22c55e;
      background: #052e16;
      color: #22c55e;
    }

    .option-btn.wrong {
      border-color: #ef4444;
      background: #450a0a;
      color: #ef4444;
    }

    .option-btn.reveal {
      border-color: #22c55e;
      background: #052e16;
      color: #22c55e;
    }

    .option-btn:disabled {
      cursor: default;
    }

    .example-sentence {
      margin-top: 20px;
      padding: 16px;
      background: #0f172a;
      border-radius: 12px;
      text-align: left;
      display: none;
    }

    .example-sentence .en {
      font-size: 15px;
      color: #cbd5e1;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .example-sentence .ko {
      font-size: 14px;
      color: #64748b;
      line-height: 1.4;
    }

    .next-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    .next-btn:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* Result screen */
    .result-screen {
      display: none;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .result-screen .emoji {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .result-screen h2 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .result-screen .score-text {
      font-size: 18px;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .result-screen .score-text span {
      color: #38bdf8;
      font-weight: 700;
    }

    .wrong-list {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      text-align: left;
      margin-bottom: 24px;
    }

    .wrong-list h3 {
      font-size: 16px;
      color: #f97316;
      margin-bottom: 12px;
    }

    .wrong-item {
      padding: 10px 0;
      border-bottom: 1px solid #334155;
    }

    .wrong-item:last-child {
      border-bottom: none;
    }

    .wrong-item .w-word {
      font-weight: 600;
      color: #f8fafc;
    }

    .wrong-item .w-meaning {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 2px;
    }

    .retry-btn {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    /* Start screen */
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .start-screen .logo {
      font-size: 72px;
      margin-bottom: 16px;
    }

    .start-screen h2 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .start-screen p {
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 16px;
    }

    .start-btn {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 14px;
      padding: 16px 48px;
      color: white;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .completed-msg {
      display: none;
      text-align: center;
      width: 100%;
      max-width: 400px;
      margin-top: 40px;
    }

    .completed-msg .emoji { font-size: 48px; margin-bottom: 12px; }
    .completed-msg p { color: #94a3b8; font-size: 16px; line-height: 1.5; }
  </style>
</head>
<body>

  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <div class="logo">📚</div>
    <h2>매일 영단어 퀴즈</h2>
    <p>매일 10개의 영단어를 학습하세요</p>
    <button class="start-btn" onclick="startQuiz()">오늘의 퀴즈 시작</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" style="display:none; width:100%; max-width:400px; display:none; flex-direction:column; align-items:center;">
    <div class="header">
      <h1>매일 영단어 퀴즈</h1>
      <div class="date" id="todayDate"></div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="number" id="scoreDisplay">0</div>
        <div class="label">맞은 수</div>
      </div>
      <div class="stat-box streak-box">
        <div class="number" id="streakDisplay">0</div>
        <div class="label">연속 출석</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="quiz-card" id="quizCard">
      <div class="quiz-number" id="quizNumber"></div>
      <div class="word" id="quizWord"></div>
      <div class="phonetic" id="quizPhonetic"></div>
      <div class="part-of-speech" id="quizPos"></div>
      <div class="options" id="quizOptions"></div>
      <div class="example-sentence" id="exampleSentence">
        <div class="en" id="exampleEn"></div>
        <div class="ko" id="exampleKo"></div>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div class="result-screen" id="resultScreen">
    <div class="emoji" id="resultEmoji"></div>
    <h2 id="resultTitle"></h2>
    <div class="score-text" id="resultScore"></div>
    <div class="wrong-list" id="wrongList" style="display:none;">
      <h3>틀린 단어 복습</h3>
      <div id="wrongItems"></div>
    </div>
    <button class="retry-btn" onclick="location.reload()">홈으로 돌아가기</button>
  </div>

  <!-- Completed Today -->
  <div class="completed-msg" id="completedMsg">
    <div class="emoji">🎉</div>
    <p>오늘의 퀴즈를 이미 완료했어요!<br>내일 다시 도전하세요.</p>
  </div>

  <script>
    // ==================== 단어 데이터 ====================
    const WORDS = [
      { word: "abandon", phonetic: "/əˈbændən/", pos: "동사", meaning: "버리다, 포기하다", wrong1: "채택하다", wrong2: "수리하다", wrong3: "발견하다", exEn: "They had to abandon the sinking ship.", exKo: "그들은 침몰하는 배를 버려야 했다." },
      { word: "benefit", phonetic: "/ˈbenɪfɪt/", pos: "명사", meaning: "이익, 혜택", wrong1: "손해", wrong2: "규칙", wrong3: "습관", exEn: "Exercise has many health benefits.", exKo: "운동은 건강에 많은 이점이 있다." },
      { word: "crucial", phonetic: "/ˈkruːʃəl/", pos: "형용사", meaning: "중대한, 결정적인", wrong1: "사소한", wrong2: "느린", wrong3: "부드러운", exEn: "This is a crucial moment in history.", exKo: "이것은 역사에서 결정적인 순간이다." },
      { word: "decline", phonetic: "/dɪˈklaɪn/", pos: "동사", meaning: "거절하다, 감소하다", wrong1: "수락하다", wrong2: "증가하다", wrong3: "설명하다", exEn: "She declined the invitation politely.", exKo: "그녀는 초대를 정중히 거절했다." },
      { word: "efficient", phonetic: "/ɪˈfɪʃənt/", pos: "형용사", meaning: "효율적인", wrong1: "낭비적인", wrong2: "느긋한", wrong3: "위험한", exEn: "This engine is very fuel efficient.", exKo: "이 엔진은 매우 연비가 좋다." },
      { word: "frustrate", phonetic: "/ˈfrʌstreɪt/", pos: "동사", meaning: "좌절시키다", wrong1: "격려하다", wrong2: "축하하다", wrong3: "안내하다", exEn: "The delays frustrated all the passengers.", exKo: "지연은 모든 승객을 좌절시켰다." },
      { word: "genuine", phonetic: "/ˈdʒenjuɪn/", pos: "형용사", meaning: "진짜의, 진심의", wrong1: "가짜의", wrong2: "평범한", wrong3: "복잡한", exEn: "She showed genuine concern for others.", exKo: "그녀는 다른 사람들에 대한 진심 어린 관심을 보였다." },
      { word: "hesitate", phonetic: "/ˈhezɪteɪt/", pos: "동사", meaning: "망설이다, 주저하다", wrong1: "서두르다", wrong2: "결정하다", wrong3: "거절하다", exEn: "Don't hesitate to ask for help.", exKo: "도움을 요청하는 것을 망설이지 마세요." },
      { word: "inevitable", phonetic: "/ɪnˈevɪtəbl/", pos: "형용사", meaning: "피할 수 없는, 불가피한", wrong1: "선택적인", wrong2: "일시적인", wrong3: "유연한", exEn: "Change is inevitable in life.", exKo: "삶에서 변화는 불가피하다." },
      { word: "justify", phonetic: "/ˈdʒʌstɪfaɪ/", pos: "동사", meaning: "정당화하다", wrong1: "비난하다", wrong2: "숨기다", wrong3: "포기하다", exEn: "How can you justify such behavior?", exKo: "그런 행동을 어떻게 정당화할 수 있나요?" },
      { word: "keen", phonetic: "/kiːn/", pos: "형용사", meaning: "열망하는, 예리한", wrong1: "무관심한", wrong2: "둔한", wrong3: "게으른", exEn: "She is keen to learn new things.", exKo: "그녀는 새로운 것을 배우기를 열망한다." },
      { word: "launch", phonetic: "/lɔːntʃ/", pos: "동사", meaning: "시작하다, 출시하다", wrong1: "중단하다", wrong2: "숨기다", wrong3: "파괴하다", exEn: "They will launch the new product next month.", exKo: "그들은 다음 달에 새 제품을 출시할 것이다." },
      { word: "maintain", phonetic: "/meɪnˈteɪn/", pos: "동사", meaning: "유지하다, 주장하다", wrong1: "파괴하다", wrong2: "무시하다", wrong3: "줄이다", exEn: "It's important to maintain good health.", exKo: "건강을 유지하는 것이 중요하다." },
      { word: "negotiate", phonetic: "/nɪˈɡoʊʃieɪt/", pos: "동사", meaning: "협상하다", wrong1: "거부하다", wrong2: "강요하다", wrong3: "포기하다", exEn: "They negotiated a peace agreement.", exKo: "그들은 평화 협정을 협상했다." },
      { word: "obstacle", phonetic: "/ˈɑːbstəkl/", pos: "명사", meaning: "장애물", wrong1: "기회", wrong2: "도구", wrong3: "보상", exEn: "Lack of money was a major obstacle.", exKo: "돈의 부족이 주요 장애물이었다." },
      { word: "persuade", phonetic: "/pərˈsweɪd/", pos: "동사", meaning: "설득하다", wrong1: "위협하다", wrong2: "무시하다", wrong3: "속이다", exEn: "She persuaded him to change his mind.", exKo: "그녀는 그가 마음을 바꾸도록 설득했다." },
      { word: "reluctant", phonetic: "/rɪˈlʌktənt/", pos: "형용사", meaning: "꺼리는, 마지못한", wrong1: "열정적인", wrong2: "자발적인", wrong3: "기꺼이 하는", exEn: "He was reluctant to admit his mistake.", exKo: "그는 자신의 실수를 인정하기를 꺼렸다." },
      { word: "significant", phonetic: "/sɪɡˈnɪfɪkənt/", pos: "형용사", meaning: "중요한, 의미 있는", wrong1: "사소한", wrong2: "불필요한", wrong3: "평범한", exEn: "This is a significant achievement.", exKo: "이것은 중요한 성과이다." },
      { word: "thorough", phonetic: "/ˈθɜːroʊ/", pos: "형용사", meaning: "철저한, 꼼꼼한", wrong1: "대충하는", wrong2: "성급한", wrong3: "부주의한", exEn: "The police conducted a thorough investigation.", exKo: "경찰은 철저한 조사를 실시했다." },
      { word: "urban", phonetic: "/ˈɜːrbən/", pos: "형용사", meaning: "도시의", wrong1: "시골의", wrong2: "해외의", wrong3: "지하의", exEn: "Urban areas have a higher population density.", exKo: "도시 지역은 인구 밀도가 더 높다." },
      { word: "vulnerable", phonetic: "/ˈvʌlnərəbl/", pos: "형용사", meaning: "취약한, 상처받기 쉬운", wrong1: "강한", wrong2: "안전한", wrong3: "무적의", exEn: "Children are especially vulnerable to diseases.", exKo: "어린이는 특히 질병에 취약하다." },
      { word: "widespread", phonetic: "/ˈwaɪdspred/", pos: "형용사", meaning: "광범위한, 널리 퍼진", wrong1: "제한된", wrong2: "좁은", wrong3: "드문", exEn: "There is widespread concern about pollution.", exKo: "오염에 대한 광범위한 우려가 있다." },
      { word: "yield", phonetic: "/jiːld/", pos: "동사", meaning: "산출하다, 양보하다", wrong1: "저항하다", wrong2: "숨기다", wrong3: "파괴하다", exEn: "The experiment yielded interesting results.", exKo: "그 실험은 흥미로운 결과를 산출했다." },
      { word: "ambiguous", phonetic: "/æmˈbɪɡjuəs/", pos: "형용사", meaning: "모호한, 애매한", wrong1: "명확한", wrong2: "단순한", wrong3: "정확한", exEn: "His answer was deliberately ambiguous.", exKo: "그의 대답은 의도적으로 모호했다." },
      { word: "compile", phonetic: "/kəmˈpaɪl/", pos: "동사", meaning: "편집하다, 모으다", wrong1: "분산하다", wrong2: "삭제하다", wrong3: "숨기다", exEn: "She compiled a list of useful resources.", exKo: "그녀는 유용한 자료 목록을 편집했다." },
      { word: "demonstrate", phonetic: "/ˈdemənstreɪt/", pos: "동사", meaning: "보여주다, 시위하다", wrong1: "숨기다", wrong2: "부정하다", wrong3: "무시하다", exEn: "He demonstrated how the machine works.", exKo: "그는 기계가 어떻게 작동하는지 보여주었다." },
      { word: "elaborate", phonetic: "/ɪˈlæbərət/", pos: "형용사", meaning: "정교한, 상세한", wrong1: "간단한", wrong2: "거친", wrong3: "대충의", exEn: "She wore an elaborate costume to the party.", exKo: "그녀는 파티에 정교한 의상을 입었다." },
      { word: "feasible", phonetic: "/ˈfiːzəbl/", pos: "형용사", meaning: "실현 가능한", wrong1: "불가능한", wrong2: "비현실적인", wrong3: "위험한", exEn: "Is this plan financially feasible?", exKo: "이 계획은 재정적으로 실현 가능한가?" },
      { word: "grasp", phonetic: "/ɡræsp/", pos: "동사", meaning: "이해하다, 움켜쥐다", wrong1: "놓치다", wrong2: "잊다", wrong3: "거부하다", exEn: "He quickly grasped the concept.", exKo: "그는 그 개념을 빠르게 이해했다." },
      { word: "hypothesis", phonetic: "/haɪˈpɑːθəsɪs/", pos: "명사", meaning: "가설", wrong1: "결론", wrong2: "사실", wrong3: "증거", exEn: "We need to test this hypothesis.", exKo: "우리는 이 가설을 검증해야 한다." },
      { word: "implement", phonetic: "/ˈɪmplɪment/", pos: "동사", meaning: "시행하다, 실행하다", wrong1: "취소하다", wrong2: "지연하다", wrong3: "무시하다", exEn: "The government will implement new policies.", exKo: "정부는 새로운 정책을 시행할 것이다." },
      { word: "allocate", phonetic: "/ˈæləkeɪt/", pos: "동사", meaning: "할당하다, 배분하다", wrong1: "회수하다", wrong2: "낭비하다", wrong3: "숨기다", exEn: "We need to allocate more resources.", exKo: "우리는 더 많은 자원을 할당해야 한다." },

      { word: "interval", phonetic: "/ˈɪntərvəl/", pos: "명사", meaning: "간격, 사이", wrong1: "연속", wrong2: "전체", wrong3: "끝", exEn: "Trains run at regular intervals.", exKo: "기차는 규칙적인 간격으로 운행한다." },
      { word: "persist", phonetic: "/pərˈsɪst/", pos: "동사", meaning: "지속하다, 고집하다", wrong1: "포기하다", wrong2: "그만두다", wrong3: "멈추다", exEn: "If symptoms persist, see a doctor.", exKo: "증상이 지속되면 의사를 만나세요." },
      { word: "relevant", phonetic: "/ˈreləvənt/", pos: "형용사", meaning: "관련 있는, 적절한", wrong1: "무관한", wrong2: "불필요한", wrong3: "쓸모없는", exEn: "Please provide relevant information.", exKo: "관련 있는 정보를 제공해 주세요." },
      { word: "specify", phonetic: "/ˈspesɪfaɪ/", pos: "동사", meaning: "명시하다, 지정하다", wrong1: "모호하게 하다", wrong2: "생략하다", wrong3: "숨기다", exEn: "Please specify your requirements.", exKo: "요구사항을 명시해 주세요." },
    ];

    // ==================== 퀴즈 로직 ====================
    const QUIZ_COUNT = 10;
    let currentQuiz = [];
    let currentIndex = 0;
    let score = 0;
    let wrongAnswers = [];

    function getTodayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function getStreak() {
      return parseInt(localStorage.getItem('streak') || '0');
    }

    function updateStreak() {
      const today = getTodayKey();
      const lastDate = localStorage.getItem('lastQuizDate');

      if (lastDate === today) return;

      if (lastDate) {
        const last = new Date(lastDate);
        const now = new Date(today);
        const diffDays = Math.floor((now - last) / (1000 * 60 * 60 * 24));
        if (diffDays === 1) {
          localStorage.setItem('streak', getStreak() + 1);
        } else if (diffDays > 1) {
          localStorage.setItem('streak', '1');
        }
      } else {
        localStorage.setItem('streak', '1');
      }
      localStorage.setItem('lastQuizDate', today);
    }

    function selectTodayWords() {
      // Use date as seed for consistent daily quiz
      const today = getTodayKey();
      let seed = 0;
      for (let i = 0; i < today.length; i++) {
        seed = ((seed << 5) - seed) + today.charCodeAt(i);
        seed |= 0;
      }

      // Shuffle with seed
      const indices = WORDS.map((_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        seed = (seed * 16807 + 0) % 2147483647;
        const j = Math.abs(seed) % (i + 1);
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }

      return indices.slice(0, QUIZ_COUNT).map(i => WORDS[i]);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startQuiz() {
      const today = getTodayKey();
      if (localStorage.getItem('completedDate') === today) {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('completedMsg').style.display = 'block';
        return;
      }

      currentQuiz = selectTodayWords();
      currentIndex = 0;
      score = 0;
      wrongAnswers = [];

      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('quizScreen').style.display = 'flex';

      const d = new Date();
      document.getElementById('todayDate').textContent =
        `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;

      document.getElementById('streakDisplay').textContent = getStreak();

      showQuestion();
    }

    function showQuestion() {
      const q = currentQuiz[currentIndex];

      document.getElementById('quizNumber').textContent =
        `${currentIndex + 1} / ${QUIZ_COUNT}`;
      document.getElementById('quizWord').textContent = q.word;
      document.getElementById('quizPhonetic').textContent = q.phonetic;
      document.getElementById('quizPos').textContent = q.pos;
      document.getElementById('progressFill').style.width =
        `${(currentIndex / QUIZ_COUNT) * 100}%`;
      document.getElementById('scoreDisplay').textContent = score;

      const options = shuffle([q.meaning, q.wrong1, q.wrong2, q.wrong3]);

      const optContainer = document.getElementById('quizOptions');
      optContainer.innerHTML = '';

      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(btn, opt, q);
        optContainer.appendChild(btn);
      });

      document.getElementById('exampleSentence').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
    }

    function selectAnswer(btn, selected, q) {
      const buttons = document.querySelectorAll('.option-btn');
      buttons.forEach(b => b.disabled = true);

      const isCorrect = selected === q.meaning;

      if (isCorrect) {
        btn.classList.add('correct');
        score++;
        document.getElementById('scoreDisplay').textContent = score;
      } else {
        btn.classList.add('wrong');
        wrongAnswers.push(q);
        buttons.forEach(b => {
          if (b.textContent === q.meaning) b.classList.add('reveal');
        });
      }

      // Show example
      document.getElementById('exampleEn').textContent = `"${q.exEn}"`;
      document.getElementById('exampleKo').textContent = q.exKo;
      document.getElementById('exampleSentence').style.display = 'block';
      document.getElementById('nextBtn').style.display = 'block';
      document.getElementById('nextBtn').textContent =
        currentIndex < QUIZ_COUNT - 1 ? '다음 문제' : '결과 보기';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < QUIZ_COUNT) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('quizScreen').style.display = 'none';
      document.getElementById('resultScreen').style.display = 'block';

      updateStreak();
      localStorage.setItem('completedDate', getTodayKey());

      const pct = Math.round((score / QUIZ_COUNT) * 100);
      let emoji, title;

      if (pct === 100) { emoji = '🏆'; title = '완벽해요!'; }
      else if (pct >= 80) { emoji = '🎉'; title = '훌륭해요!'; }
      else if (pct >= 60) { emoji = '👍'; title = '잘했어요!'; }
      else if (pct >= 40) { emoji = '💪'; title = '조금 더 노력!'; }
      else { emoji = '📖'; title = '복습이 필요해요'; }

      document.getElementById('resultEmoji').textContent = emoji;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultScore').innerHTML =
        `${QUIZ_COUNT}문제 중 <span>${score}개</span> 정답 (${pct}%)`;

      if (wrongAnswers.length > 0) {
        document.getElementById('wrongList').style.display = 'block';
        const container = document.getElementById('wrongItems');
        container.innerHTML = '';
        wrongAnswers.forEach(w => {
          const div = document.createElement('div');
          div.className = 'wrong-item';
          div.innerHTML = `
            <div class="w-word">${w.word} <span style="color:#64748b">${w.phonetic}</span></div>
            <div class="w-meaning">${w.meaning}</div>
          `;
          container.appendChild(div);
        });
      }
    }

    // Check if already completed today
    window.addEventListener('load', () => {
      const today = getTodayKey();
      if (localStorage.getItem('completedDate') === today) {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('completedMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
