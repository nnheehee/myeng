<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TOEIC 매일학습">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>TOEIC 매일학습</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 20px;
      padding-top: env(safe-area-inset-top, 20px);
    }
    .container { max-width: 420px; margin: 0 auto; }

    /* ===== 탭 네비게이션 ===== */
    .tab-nav {
      display: flex;
      background: #1e293b;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: none;
      color: #94a3b8;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      color: white;
    }

    /* ===== 공통 스타일 ===== */
    .screen { display: none; }
    .screen.active { display: block; }
    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; }

    /* ===== 홈 화면 ===== */
    .home-header { text-align: center; margin-bottom: 24px; }
    .home-header h1 { font-size: 24px; margin-bottom: 4px; }
    .home-header .date { color: #94a3b8; font-size: 14px; }
    .home-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .home-stat {
      flex: 1;
      background: #1e293b;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .home-stat .num {
      font-size: 22px;
      font-weight: 700;
      color: #38bdf8;
    }
    .home-stat .lbl {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }
    .home-stat.streak .num { color: #f97316; }
    .menu-btn {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 14px;
      padding: 18px 20px;
      color: #e2e8f0;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-tap-highlight-color: transparent;
    }
    .menu-btn .icon { font-size: 24px; }
    .menu-btn .info { flex: 1; }
    .menu-btn .sub { font-size: 12px; color: #94a3b8; font-weight: 400; margin-top: 2px; }
    .menu-btn .badge {
      background: #22c55e;
      color: white;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .menu-btn.done { opacity: 0.5; }
    .menu-btn.done .badge { background: #64748b; }

    /* ===== 단어 퀴즈 ===== */
    .quiz-progress {
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .quiz-stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 14px;
      color: #94a3b8;
    }
    .quiz-stats .score { color: #38bdf8; font-weight: 700; }
    .word-display {
      text-align: center;
      margin-bottom: 24px;
    }
    .word-display .word {
      font-size: 34px;
      font-weight: 700;
      color: #f8fafc;
      margin-bottom: 6px;
    }
    .word-display .phonetic {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 4px;
    }
    .word-display .pos {
      font-size: 13px;
      color: #818cf8;
      font-weight: 500;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-btn {
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      color: #e2e8f0;
      font-size: 15px;
      cursor: pointer;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    .opt-btn:active { transform: scale(0.98); }
    .opt-btn.correct { border-color: #22c55e; background: #052e16; color: #22c55e; }
    .opt-btn.wrong { border-color: #ef4444; background: #450a0a; color: #ef4444; }
    .opt-btn.reveal { border-color: #22c55e; background: #052e16; color: #22c55e; }
    .opt-btn:disabled { cursor: default; }
    .example-box {
      margin-top: 16px;
      padding: 14px;
      background: #0f172a;
      border-radius: 10px;
      display: none;
    }
    .example-box .en { font-size: 14px; color: #cbd5e1; margin-bottom: 4px; line-height: 1.4; }
    .example-box .ko { font-size: 13px; color: #64748b; line-height: 1.4; }
    .next-btn {
      margin-top: 16px;
      display: none;
    }

    /* ===== 독해 ===== */
    .reading-title {
      font-size: 14px;
      color: #818cf8;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .reading-passage {
      font-size: 15px;
      line-height: 1.7;
      color: #cbd5e1;
      margin-bottom: 20px;
      word-break: break-word;
    }
    .reading-question {
      font-size: 15px;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 14px;
    }
    .translation-box {
      margin-top: 16px;
      padding: 14px;
      background: #0f172a;
      border-radius: 10px;
      display: none;
    }
    .translation-box p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .translation-box .label {
      font-size: 12px;
      color: #818cf8;
      font-weight: 600;
      margin-bottom: 6px;
    }

    /* ===== 결과 화면 ===== */
    .result-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .result-header .emoji { font-size: 56px; margin-bottom: 10px; }
    .result-header h2 { font-size: 24px; margin-bottom: 6px; }
    .result-header .score-text { color: #94a3b8; font-size: 16px; }
    .result-header .score-text span { color: #38bdf8; font-weight: 700; }
    .wrong-review { margin-bottom: 20px; }
    .wrong-review h3 { font-size: 15px; color: #f97316; margin-bottom: 10px; }
    .wrong-item {
      padding: 10px 0;
      border-bottom: 1px solid #334155;
    }
    .wrong-item:last-child { border-bottom: none; }
    .wrong-item .wi-word { font-weight: 600; color: #f8fafc; font-size: 15px; }
    .wrong-item .wi-meaning { font-size: 13px; color: #94a3b8; margin-top: 2px; }

    /* ===== 달력 ===== */
    .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .cal-header h2 { font-size: 18px; }
    .cal-nav {
      background: none;
      border: 1px solid #334155;
      color: #e2e8f0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 13px;
      position: relative;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-day.empty { cursor: default; }
    .cal-day.today {
      border: 2px solid #38bdf8;
    }
    .cal-day.has-data {
      background: #1e293b;
    }
    .cal-day .day-num {
      font-weight: 600;
      font-size: 13px;
    }
    .cal-day .day-dots {
      display: flex;
      gap: 2px;
      margin-top: 2px;
    }
    .cal-day .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .dot.vocab { background: #38bdf8; }
    .dot.read { background: #a78bfa; }
    .cal-day.perfect {
      background: linear-gradient(135deg, rgba(56,189,248,0.2), rgba(129,140,248,0.2));
    }

    /* 달력 상세 */
    .cal-detail {
      display: none;
      margin-top: 16px;
    }
    .cal-detail .detail-date {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 10px;
    }
    .detail-scores {
      display: flex;
      gap: 12px;
    }
    .detail-score {
      flex: 1;
      background: #0f172a;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .detail-score .ds-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .detail-score .ds-value {
      font-size: 22px;
      font-weight: 700;
    }
    .detail-score .ds-value.v-color { color: #38bdf8; }
    .detail-score .ds-value.r-color { color: #a78bfa; }

    .legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    .legend span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .legend .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.grammar { background: #34d399; }

    /* ===== 문법 ===== */
    .grammar-sentence {
      font-size: 17px;
      line-height: 1.7;
      color: #f8fafc;
      margin-bottom: 20px;
      text-align: center;
    }
    .grammar-sentence .blank {
      color: #38bdf8;
      font-weight: 700;
      border-bottom: 2px solid #38bdf8;
      padding: 0 4px;
    }
    .grammar-category {
      font-size: 12px;
      color: #34d399;
      font-weight: 600;
      margin-bottom: 14px;
      text-align: center;
    }
    .explain-box {
      margin-top: 16px;
      padding: 14px;
      background: #0f172a;
      border-radius: 10px;
      display: none;
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="container">

  <!-- 탭 네비게이션 -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('home')">홈</button>
    <button class="tab-btn" onclick="showTab('calendar')">달력</button>
  </div>

  <!-- ===== 홈 화면 ===== -->
  <div class="screen active" id="homeScreen">
    <div class="home-header">
      <h1>TOEIC 매일학습</h1>
      <div class="date" id="homeDate"></div>
    </div>
    <div class="home-stats">
      <div class="home-stat streak">
        <div class="num" id="homeStreak">0</div>
        <div class="lbl">연속 출석</div>
      </div>
      <div class="home-stat">
        <div class="num" id="homeTotalWords">0</div>
        <div class="lbl">학습 단어</div>
      </div>
      <div class="home-stat">
        <div class="num" id="homeTotalReadings">0</div>
        <div class="lbl">독해 완료</div>
      </div>
    </div>

    <button class="menu-btn" id="vocabMenuBtn" onclick="startVocabQuiz()">
      <div class="icon">📝</div>
      <div class="info">
        <div>영단어 퀴즈</div>
        <div class="sub">오늘의 10문제</div>
      </div>
      <div class="badge" id="vocabBadge">도전</div>
    </button>

    <button class="menu-btn" id="readMenuBtn" onclick="startReading()">
      <div class="icon">📖</div>
      <div class="info">
        <div>독해 문제</div>
        <div class="sub">오늘의 3문제</div>
      </div>
      <div class="badge" id="readBadge">도전</div>
    </button>

    <button class="menu-btn" id="grammarMenuBtn" onclick="startGrammar()">
      <div class="icon">📐</div>
      <div class="info">
        <div>문법 문제 (Part 5)</div>
        <div class="sub">오늘의 10문제</div>
      </div>
      <div class="badge" id="grammarBadge">도전</div>
    </button>
  </div>

  <!-- ===== 단어 퀴즈 ===== -->
  <div class="screen" id="vocabScreen">
    <div class="quiz-stats">
      <span id="vocabNum"></span>
      <span>맞은 수: <span class="score" id="vocabScore">0</span></span>
    </div>
    <div class="quiz-progress">
      <div class="quiz-progress-fill" id="vocabProgress" style="width:0%"></div>
    </div>
    <div class="card">
      <div class="word-display">
        <div class="word" id="vWord"></div>
        <div class="phonetic" id="vPhonetic"></div>
        <div class="pos" id="vPos"></div>
      </div>
      <div class="options" id="vOptions"></div>
      <div class="example-box" id="vExample">
        <div class="en" id="vExEn"></div>
        <div class="ko" id="vExKo"></div>
      </div>
      <button class="btn-primary next-btn" id="vNextBtn" onclick="vocabNext()">다음 문제</button>
    </div>
  </div>

  <!-- ===== 독해 ===== -->
  <div class="screen" id="readScreen">
    <div class="quiz-stats">
      <span id="readNum"></span>
      <span>맞은 수: <span class="score" id="readScore">0</span></span>
    </div>
    <div class="quiz-progress">
      <div class="quiz-progress-fill" id="readProgress" style="width:0%"></div>
    </div>
    <div class="card">
      <div class="reading-title" id="rTitle"></div>
      <div class="reading-passage" id="rPassage"></div>
      <div class="reading-question" id="rQuestion"></div>
      <div class="options" id="rOptions"></div>
      <div class="translation-box" id="rTranslation">
        <div class="label">해석</div>
        <p id="rTransText"></p>
      </div>
      <button class="btn-primary next-btn" id="rNextBtn" onclick="readNext()">다음 문제</button>
    </div>
  </div>

  <!-- ===== 단어 결과 ===== -->
  <div class="screen" id="vocabResultScreen">
    <div class="result-header">
      <div class="emoji" id="vrEmoji"></div>
      <h2 id="vrTitle"></h2>
      <div class="score-text" id="vrScore"></div>
    </div>
    <div class="card wrong-review" id="vrWrongList" style="display:none;">
      <h3>틀린 단어 복습</h3>
      <div id="vrWrongItems"></div>
    </div>
    <button class="btn-primary" onclick="goHome()">홈으로</button>
  </div>

  <!-- ===== 문법 퀴즈 ===== -->
  <div class="screen" id="grammarScreen">
    <div class="quiz-stats">
      <span id="grammarNum"></span>
      <span>맞은 수: <span class="score" id="grammarScore">0</span></span>
    </div>
    <div class="quiz-progress">
      <div class="quiz-progress-fill" id="grammarProgress" style="width:0%"></div>
    </div>
    <div class="card">
      <div class="grammar-category" id="gCategory"></div>
      <div class="grammar-sentence" id="gSentence"></div>
      <div class="options" id="gOptions"></div>
      <div class="explain-box" id="gExplain"></div>
      <button class="btn-primary next-btn" id="gNextBtn" onclick="grammarNext()">다음 문제</button>
    </div>
  </div>

  <!-- ===== 문법 결과 ===== -->
  <div class="screen" id="grammarResultScreen">
    <div class="result-header">
      <div class="emoji" id="grEmoji"></div>
      <h2 id="grTitle"></h2>
      <div class="score-text" id="grScore"></div>
    </div>
    <button class="btn-primary" onclick="goHome()">홈으로</button>
  </div>

  <!-- ===== 독해 결과 ===== -->
  <div class="screen" id="readResultScreen">
    <div class="result-header">
      <div class="emoji" id="rrEmoji"></div>
      <h2 id="rrTitle"></h2>
      <div class="score-text" id="rrScore"></div>
    </div>
    <button class="btn-primary" onclick="goHome()">홈으로</button>
  </div>

  <!-- ===== 달력 ===== -->
  <div class="screen" id="calendarScreen">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="calMove(-1)">&lt;</button>
        <h2 id="calTitle"></h2>
        <button class="cal-nav" onclick="calMove(1)">&gt;</button>
      </div>
      <div class="cal-weekdays">
        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
      </div>
      <div class="cal-days" id="calDays"></div>
      <div class="legend">
        <span><span class="dot vocab"></span> 단어</span>
        <span><span class="dot read"></span> 독해</span>
        <span><span class="dot grammar"></span> 문법</span>
      </div>
    </div>
    <div class="card cal-detail" id="calDetail">
      <div class="detail-date" id="calDetailDate"></div>
      <div class="detail-scores">
        <div class="detail-score">
          <div class="ds-label">단어 퀴즈</div>
          <div class="ds-value v-color" id="calVocabScore">-</div>
        </div>
        <div class="detail-score">
          <div class="ds-label">독해</div>
          <div class="ds-value r-color" id="calReadScore">-</div>
        </div>
        <div class="detail-score">
          <div class="ds-label">문법</div>
          <div class="ds-value" style="color:#34d399" id="calGrammarScore">-</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="words.js"></script>
<script src="readings.js"></script>
<script src="grammar.js"></script>
<script>
  // ==================== 유틸리티 ====================
  const VOCAB_COUNT = 10;
  const READ_COUNT = 3;

  function getTodayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function getRecord(dateKey) {
    const data = localStorage.getItem('record_' + dateKey);
    return data ? JSON.parse(data) : null;
  }

  function saveRecord(dateKey, type, score, total) {
    let rec = getRecord(dateKey) || {};
    rec[type] = { score, total };
    localStorage.setItem('record_' + dateKey, JSON.stringify(rec));
  }

  function getStreak() {
    let streak = 0;
    const today = new Date();
    for (let i = 0; i < 365; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const rec = getRecord(key);
      if (rec && (rec.vocab || rec.reading || rec.grammar)) {
        streak++;
      } else if (i > 0) {
        break;
      } else {
        break;
      }
    }
    return streak;
  }

  function getTotalStats() {
    let words = 0, readings = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k.startsWith('record_')) {
        const rec = JSON.parse(localStorage.getItem(k));
        if (rec.vocab) words += rec.vocab.total;
        if (rec.reading) readings += rec.reading.total;
      }
    }
    return { words, readings };
  }

  function seededShuffle(arr, seed) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      seed = (seed * 16807 + 0) % 2147483647;
      const j = Math.abs(seed) % (i + 1);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function dateSeed(dateStr) {
    let s = 0;
    for (let i = 0; i < dateStr.length; i++) {
      s = ((s << 5) - s) + dateStr.charCodeAt(i);
      s |= 0;
    }
    return Math.abs(s);
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ==================== 탭 & 네비게이션 ====================
  function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (tab === 'home' && i === 0) || (tab === 'calendar' && i === 1));
    });
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (tab === 'home') {
      document.getElementById('homeScreen').classList.add('active');
      refreshHome();
    } else {
      document.getElementById('calendarScreen').classList.add('active');
      renderCalendar();
    }
  }

  function goHome() {
    showTab('home');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ==================== 홈 화면 ====================
  function refreshHome() {
    const d = new Date();
    document.getElementById('homeDate').textContent =
      `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;

    document.getElementById('homeStreak').textContent = getStreak();
    const stats = getTotalStats();
    document.getElementById('homeTotalWords').textContent = stats.words;
    document.getElementById('homeTotalReadings').textContent = stats.readings;

    const today = getTodayKey();
    const rec = getRecord(today);

    const vBtn = document.getElementById('vocabMenuBtn');
    const vBadge = document.getElementById('vocabBadge');
    if (rec && rec.vocab) {
      vBtn.classList.remove('done');
      vBadge.textContent = `${rec.vocab.score}/${rec.vocab.total} 다시풀기`;
      vBadge.style.background = '#6366f1';
    } else {
      vBtn.classList.remove('done');
      vBadge.textContent = '도전';
      vBadge.style.background = '#22c55e';
    }

    const rBtn = document.getElementById('readMenuBtn');
    const rBadge = document.getElementById('readBadge');
    if (rec && rec.reading) {
      rBtn.classList.remove('done');
      rBadge.textContent = `${rec.reading.score}/${rec.reading.total} 다시풀기`;
      rBadge.style.background = '#6366f1';
    } else {
      rBtn.classList.remove('done');
      rBadge.textContent = '도전';
      rBadge.style.background = '#22c55e';
    }

    const gBtn = document.getElementById('grammarMenuBtn');
    const gBadge = document.getElementById('grammarBadge');
    if (rec && rec.grammar) {
      gBtn.classList.remove('done');
      gBadge.textContent = `${rec.grammar.score}/${rec.grammar.total} 다시풀기`;
      gBadge.style.background = '#6366f1';
    } else {
      gBtn.classList.remove('done');
      gBadge.textContent = '도전';
      gBadge.style.background = '#22c55e';
    }
  }

  // ==================== 단어 퀴즈 ====================
  let vocabQuiz = [], vocabIdx = 0, vocabScoreVal = 0, vocabWrong = [];

  function startVocabQuiz() {
    const today = getTodayKey();
    const rec = getRecord(today);
    const seed = dateSeed(today + (rec && rec.vocab ? '_r' + Date.now() : ''));
    const indices = seededShuffle(WORDS.map((_, i) => i), seed);
    vocabQuiz = indices.slice(0, VOCAB_COUNT).map(i => WORDS[i]);
    vocabIdx = 0;
    vocabScoreVal = 0;
    vocabWrong = [];

    showScreen('vocabScreen');
    showVocabQuestion();
  }

  function showVocabQuestion() {
    const q = vocabQuiz[vocabIdx];
    document.getElementById('vocabNum').textContent = `${vocabIdx + 1} / ${VOCAB_COUNT}`;
    document.getElementById('vocabScore').textContent = vocabScoreVal;
    document.getElementById('vocabProgress').style.width = `${(vocabIdx / VOCAB_COUNT) * 100}%`;
    document.getElementById('vWord').textContent = q.word;
    document.getElementById('vPhonetic').textContent = q.phonetic;
    document.getElementById('vPos').textContent = q.pos;

    const opts = shuffle([q.meaning, q.wrong1, q.wrong2, q.wrong3]);
    const container = document.getElementById('vOptions');
    container.innerHTML = '';
    opts.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = o;
      btn.onclick = () => vocabAnswer(btn, o, q);
      container.appendChild(btn);
    });

    document.getElementById('vExample').style.display = 'none';
    document.getElementById('vNextBtn').style.display = 'none';
  }

  function vocabAnswer(btn, selected, q) {
    const buttons = document.querySelectorAll('#vOptions .opt-btn');
    buttons.forEach(b => b.disabled = true);

    if (selected === q.meaning) {
      btn.classList.add('correct');
      vocabScoreVal++;
      document.getElementById('vocabScore').textContent = vocabScoreVal;
    } else {
      btn.classList.add('wrong');
      vocabWrong.push(q);
      buttons.forEach(b => { if (b.textContent === q.meaning) b.classList.add('reveal'); });
    }

    document.getElementById('vExEn').textContent = `"${q.exEn}"`;
    document.getElementById('vExKo').textContent = q.exKo;
    document.getElementById('vExample').style.display = 'block';
    const nb = document.getElementById('vNextBtn');
    nb.style.display = 'block';
    nb.textContent = vocabIdx < VOCAB_COUNT - 1 ? '다음 문제' : '결과 보기';
  }

  function vocabNext() {
    vocabIdx++;
    if (vocabIdx < VOCAB_COUNT) {
      showVocabQuestion();
    } else {
      saveRecord(getTodayKey(), 'vocab', vocabScoreVal, VOCAB_COUNT);
      showVocabResult();
    }
  }

  function showVocabResult() {
    showScreen('vocabResultScreen');
    const pct = Math.round((vocabScoreVal / VOCAB_COUNT) * 100);
    let emoji, title;
    if (pct === 100) { emoji = '🏆'; title = '완벽해요!'; }
    else if (pct >= 80) { emoji = '🎉'; title = '훌륭해요!'; }
    else if (pct >= 60) { emoji = '👍'; title = '잘했어요!'; }
    else if (pct >= 40) { emoji = '💪'; title = '조금 더 노력!'; }
    else { emoji = '📖'; title = '복습이 필요해요'; }

    document.getElementById('vrEmoji').textContent = emoji;
    document.getElementById('vrTitle').textContent = title;
    document.getElementById('vrScore').innerHTML = `${VOCAB_COUNT}문제 중 <span>${vocabScoreVal}개</span> 정답 (${pct}%)`;

    const wl = document.getElementById('vrWrongList');
    if (vocabWrong.length > 0) {
      wl.style.display = 'block';
      const container = document.getElementById('vrWrongItems');
      container.innerHTML = '';
      vocabWrong.forEach(w => {
        const div = document.createElement('div');
        div.className = 'wrong-item';
        div.innerHTML = `<div class="wi-word">${w.word} <span style="color:#64748b">${w.phonetic}</span></div><div class="wi-meaning">${w.meaning}</div>`;
        container.appendChild(div);
      });
    } else {
      wl.style.display = 'none';
    }
  }

  // ==================== 독해 ====================
  let readQuiz = [], readIdx = 0, readScoreVal = 0;

  function startReading() {
    const today = getTodayKey();
    const rec = getRecord(today);
    const seed = dateSeed(today + 'read' + (rec && rec.reading ? '_r' + Date.now() : ''));
    const indices = seededShuffle(READINGS.map((_, i) => i), seed);
    readQuiz = indices.slice(0, READ_COUNT).map(i => READINGS[i]);
    readIdx = 0;
    readScoreVal = 0;

    showScreen('readScreen');
    showReadQuestion();
  }

  function showReadQuestion() {
    const q = readQuiz[readIdx];
    document.getElementById('readNum').textContent = `${readIdx + 1} / ${READ_COUNT}`;
    document.getElementById('readScore').textContent = readScoreVal;
    document.getElementById('readProgress').style.width = `${(readIdx / READ_COUNT) * 100}%`;
    document.getElementById('rTitle').textContent = q.title;
    document.getElementById('rPassage').textContent = q.passage;
    document.getElementById('rQuestion').textContent = q.question;

    const container = document.getElementById('rOptions');
    container.innerHTML = '';
    q.options.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = o;
      btn.onclick = () => readAnswer(btn, i, q);
      container.appendChild(btn);
    });

    document.getElementById('rTranslation').style.display = 'none';
    document.getElementById('rNextBtn').style.display = 'none';
  }

  function readAnswer(btn, idx, q) {
    const buttons = document.querySelectorAll('#rOptions .opt-btn');
    buttons.forEach(b => b.disabled = true);

    if (idx === q.answer) {
      btn.classList.add('correct');
      readScoreVal++;
      document.getElementById('readScore').textContent = readScoreVal;
    } else {
      btn.classList.add('wrong');
      buttons[q.answer].classList.add('reveal');
    }

    document.getElementById('rTransText').textContent = q.translation;
    document.getElementById('rTranslation').style.display = 'block';
    const nb = document.getElementById('rNextBtn');
    nb.style.display = 'block';
    nb.textContent = readIdx < READ_COUNT - 1 ? '다음 문제' : '결과 보기';
  }

  function readNext() {
    readIdx++;
    if (readIdx < READ_COUNT) {
      showReadQuestion();
    } else {
      saveRecord(getTodayKey(), 'reading', readScoreVal, READ_COUNT);
      showReadResult();
    }
  }

  function showReadResult() {
    showScreen('readResultScreen');
    const pct = Math.round((readScoreVal / READ_COUNT) * 100);
    let emoji, title;
    if (pct === 100) { emoji = '🏆'; title = '완벽해요!'; }
    else if (pct >= 66) { emoji = '🎉'; title = '훌륭해요!'; }
    else { emoji = '💪'; title = '다음엔 더 잘할 수 있어요!'; }

    document.getElementById('rrEmoji').textContent = emoji;
    document.getElementById('rrTitle').textContent = title;
    document.getElementById('rrScore').innerHTML = `${READ_COUNT}문제 중 <span>${readScoreVal}개</span> 정답 (${pct}%)`;
  }

  // ==================== 문법 ====================
  const GRAMMAR_COUNT = 10;
  let grammarQuiz = [], grammarIdx = 0, grammarScoreVal = 0;

  function startGrammar() {
    const today = getTodayKey();
    const rec = getRecord(today);
    const seed = dateSeed(today + 'grammar' + (rec && rec.grammar ? '_r' + Date.now() : ''));
    const indices = seededShuffle(GRAMMAR.map((_, i) => i), seed);
    grammarQuiz = indices.slice(0, GRAMMAR_COUNT).map(i => GRAMMAR[i]);
    grammarIdx = 0;
    grammarScoreVal = 0;

    showScreen('grammarScreen');
    showGrammarQuestion();
  }

  function showGrammarQuestion() {
    const q = grammarQuiz[grammarIdx];
    document.getElementById('grammarNum').textContent = `${grammarIdx + 1} / ${GRAMMAR_COUNT}`;
    document.getElementById('grammarScore').textContent = grammarScoreVal;
    document.getElementById('grammarProgress').style.width = `${(grammarIdx / GRAMMAR_COUNT) * 100}%`;
    document.getElementById('gCategory').textContent = q.category;
    document.getElementById('gSentence').innerHTML = q.sentence.replace('______', '<span class="blank">______</span>');

    const container = document.getElementById('gOptions');
    container.innerHTML = '';
    q.options.forEach((o, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = o;
      btn.onclick = () => grammarAnswer(btn, i, q);
      container.appendChild(btn);
    });

    document.getElementById('gExplain').style.display = 'none';
    document.getElementById('gNextBtn').style.display = 'none';
  }

  function grammarAnswer(btn, idx, q) {
    const buttons = document.querySelectorAll('#gOptions .opt-btn');
    buttons.forEach(b => b.disabled = true);

    if (idx === q.answer) {
      btn.classList.add('correct');
      grammarScoreVal++;
      document.getElementById('grammarScore').textContent = grammarScoreVal;
    } else {
      btn.classList.add('wrong');
      buttons[q.answer].classList.add('reveal');
    }

    // Show filled sentence and explanation
    document.getElementById('gSentence').innerHTML = q.sentence.replace('______', '<span class="blank">' + q.options[q.answer] + '</span>');
    document.getElementById('gExplain').textContent = q.explanation;
    document.getElementById('gExplain').style.display = 'block';
    const nb = document.getElementById('gNextBtn');
    nb.style.display = 'block';
    nb.textContent = grammarIdx < GRAMMAR_COUNT - 1 ? '다음 문제' : '결과 보기';
  }

  function grammarNext() {
    grammarIdx++;
    if (grammarIdx < GRAMMAR_COUNT) {
      showGrammarQuestion();
    } else {
      saveRecord(getTodayKey(), 'grammar', grammarScoreVal, GRAMMAR_COUNT);
      showGrammarResult();
    }
  }

  function showGrammarResult() {
    showScreen('grammarResultScreen');
    const pct = Math.round((grammarScoreVal / GRAMMAR_COUNT) * 100);
    let emoji, title;
    if (pct === 100) { emoji = '🏆'; title = '완벽해요!'; }
    else if (pct >= 80) { emoji = '🎉'; title = '훌륭해요!'; }
    else if (pct >= 60) { emoji = '👍'; title = '잘했어요!'; }
    else if (pct >= 40) { emoji = '💪'; title = '조금 더 노력!'; }
    else { emoji = '📖'; title = '복습이 필요해요'; }

    document.getElementById('grEmoji').textContent = emoji;
    document.getElementById('grTitle').textContent = title;
    document.getElementById('grScore').innerHTML = `${GRAMMAR_COUNT}문제 중 <span>${grammarScoreVal}개</span> 정답 (${pct}%)`;
  }

  // ==================== 달력 ====================
  let calYear, calMonth;

  function initCalendar() {
    const d = new Date();
    calYear = d.getFullYear();
    calMonth = d.getMonth();
  }

  function calMove(dir) {
    calMonth += dir;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${calYear}년 ${calMonth + 1}월`;

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const today = getTodayKey();

    const container = document.getElementById('calDays');
    container.innerHTML = '';

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      const div = document.createElement('div');
      div.className = 'cal-day empty';
      container.appendChild(div);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      const rec = getRecord(key);
      const div = document.createElement('div');
      let cls = 'cal-day';
      if (key === today) cls += ' today';
      if (rec) {
        cls += ' has-data';
        if (rec.vocab && rec.reading && rec.grammar &&
            rec.vocab.score === rec.vocab.total &&
            rec.reading.score === rec.reading.total &&
            rec.grammar.score === rec.grammar.total) {
          cls += ' perfect';
        }
      }
      div.className = cls;

      let dotsHtml = '';
      if (rec) {
        if (rec.vocab) dotsHtml += '<span class="dot vocab"></span>';
        if (rec.reading) dotsHtml += '<span class="dot read"></span>';
        if (rec.grammar) dotsHtml += '<span class="dot grammar"></span>';
      }

      div.innerHTML = `<span class="day-num">${d}</span><div class="day-dots">${dotsHtml}</div>`;

      if (rec) {
        div.onclick = () => showCalDetail(key, rec);
      }

      container.appendChild(div);
    }

    document.getElementById('calDetail').style.display = 'none';
  }

  function showCalDetail(dateKey, rec) {
    const parts = dateKey.split('-');
    document.getElementById('calDetailDate').textContent =
      `${parts[0]}년 ${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;

    const vs = document.getElementById('calVocabScore');
    if (rec.vocab) {
      vs.textContent = `${rec.vocab.score}/${rec.vocab.total}`;
    } else {
      vs.textContent = '-';
    }

    const rs = document.getElementById('calReadScore');
    if (rec.reading) {
      rs.textContent = `${rec.reading.score}/${rec.reading.total}`;
    } else {
      rs.textContent = '-';
    }

    const gs = document.getElementById('calGrammarScore');
    if (rec.grammar) {
      gs.textContent = `${rec.grammar.score}/${rec.grammar.total}`;
    } else {
      gs.textContent = '-';
    }

    document.getElementById('calDetail').style.display = 'block';
  }

  // ==================== 초기화 ====================
  initCalendar();
  refreshHome();
</script>
</body>
</html>
